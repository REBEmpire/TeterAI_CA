name: teterai_mobile
description: TeterAI Construction Administration — mobile review app.
version: 0.1.0+1
publish_to: none

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase / Firestore real-time
  cloud_firestore: ^5.4.0
  firebase_core: ^3.6.0

  # Google Sign-In
  google_sign_in: ^6.2.1

  # HTTP client for backend API
  http: ^1.2.2

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # JWT decode (client-side only — no secret)
  dart_jsonwebtoken: ^2.7.5

  # State management
  flutter_riverpod: ^2.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
